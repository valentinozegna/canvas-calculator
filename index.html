<!-- Canvas Ratio — UXP panel -->
<style>
  body { font-family: var(--uxp-host-font-family, sans-serif); color: var(--uxp-host-text-color); margin: 0; padding: 10px; font-size: 12px; }
  h1 { font-size: 13px; font-weight: 600; margin: 0 0 8px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row > div { flex: 1; }
  label { display: block; font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
  input[type="number"] { width: 100%; box-sizing: border-box; }
  #docnote { font-size: 11px; opacity: 0.75; margin: 6px 0 10px; line-height: 1.4; }
  .section { font-size: 11px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.04em; margin: 12px 0 6px; }
  .card { border: 1px solid var(--uxp-host-border-color, rgba(128,128,128,0.3)); border-radius: 6px; padding: 8px; margin-bottom: 6px; }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; }
  .card .name { font-weight: 600; font-size: 12px; }
  .card .ratio { font-size: 10px; opacity: 0.6; }
  .card .target { font-size: 14px; font-weight: 600; margin: 3px 0; }
  .card .delta { font-size: 10px; opacity: 0.7; margin-bottom: 6px; }
  .card .btns { display: flex; gap: 6px; }
  .card .btns sp-button { flex: 1; }
  .fitrow { display: flex; gap: 6px; margin: 8px 0; }
  .fitrow sp-button { flex: 1; }
  .checkrow { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  sp-button { width: 100%; }
</style>

<h1>Canvas Ratio</h1>

<div class="row">
  <div>
    <label>Width</label>
    <input type="number" id="iw" value="0" step="0.01" min="0.01" />
  </div>
  <div>
    <label>Height</label>
    <input type="number" id="ih" value="0" step="0.01" min="0.01" />
  </div>
  <div style="flex:0.7">
    <label>Unit</label>
    <sp-picker id="unit" size="s" style="width:100%">
      <sp-menu slot="options">
        <sp-menu-item value="in" selected>in</sp-menu-item>
        <sp-menu-item value="cm">cm</sp-menu-item>
        <sp-menu-item value="mm">mm</sp-menu-item>
      </sp-menu>
    </sp-picker>
  </div>
</div>

<div class="row">
  <div>
    <label>Orientation</label>
    <sp-picker id="orient" size="s" style="width:100%">
      <sp-menu slot="options">
        <sp-menu-item value="match" selected>Match image</sp-menu-item>
        <sp-menu-item value="landscape">Force landscape</sp-menu-item>
        <sp-menu-item value="portrait">Force portrait</sp-menu-item>
      </sp-menu>
    </sp-picker>
  </div>
  <div>
    <label>Anchor</label>
    <sp-picker id="anchor" size="s" style="width:100%">
      <sp-menu slot="options">
        <sp-menu-item value="center" selected>Center</sp-menu-item>
        <sp-menu-item value="start">Top / Left</sp-menu-item>
        <sp-menu-item value="end">Bottom / Right</sp-menu-item>
      </sp-menu>
    </sp-picker>
  </div>
</div>

<div class="row">
  <div>
    <label>Paper system</label>
    <sp-picker id="system" size="s" style="width:100%">
      <sp-menu slot="options">
        <sp-menu-item value="us" selected>US (inches)</sp-menu-item>
        <sp-menu-item value="eu">EU (cm)</sp-menu-item>
      </sp-menu>
    </sp-picker>
  </div>
  <div style="flex:0.7">
    <label>PPI</label>
    <input type="number" id="ppi" value="300" step="1" min="1" />
  </div>
</div>

<sp-button id="refresh" variant="secondary" quiet size="s" style="width:100%; margin-bottom:8px;">Read active document</sp-button>

<div id="docnote">Open a document and tap “Read active document”.</div>

<div class="fitrow">
  <sp-button id="fill" variant="secondary" size="s">Fill canvas</sp-button>
  <sp-button id="fit" variant="secondary" size="s">Fit to canvas</sp-button>
</div>

<div class="checkrow">
  <sp-checkbox id="usecustom" size="s"></sp-checkbox>
  <label style="margin:0; opacity:1;">Custom size</label>
  <input type="number" id="cw" value="0" step="0.01" min="0.01" style="flex:1" />
  <span style="opacity:0.6">×</span>
  <input type="number" id="ch" value="0" step="0.01" min="0.01" style="flex:1" />
</div>

<div class="section">Print sizes</div>
<div id="results"></div>

<script src="ratio.js"></script>
<script src="index.js"></script>
