      - heading "UXP Manifest" [level=1] [ref=e99]
      - paragraph [ref=e100]:
        - text: The manifest is a JSON file that is located at the root of the plugin bundle. It is named
        - code [ref=e101]: manifest.json
        - text: and is required for all plugins.
      - heading "Overview" [level=2] [ref=e102]:
        - text: Overview
        - link [ref=e104] [cursor=pointer]:
          - /url: "#overview"
          - img [ref=e105]
      - separator [ref=e107]
      - paragraph [ref=e108]:
        - text: Each UXP plugin has one
        - code [ref=e109]: manifest.json
        - text: file that describes the plugin. It contains metadata such as the plugin's name, version, icons, and entry points.
      - paragraph [ref=e110]:
        - text: The manifest file also contains the permissions that the plugin requires. Most importantly, it contains your plugin ID which is used to identify your plugin. (Valid plugin IDs are required for distributing in Adobe's Marketplace, read more
        - link "in the docmentation" [ref=e111] [cursor=pointer]:
          - /url: https://developer.adobe.com/developer-distribution/creative-cloud/docs/guides/plugin_id/
        - text: .)
      - paragraph [ref=e112]:
        - text: Since UXP plugins can be run in a number of different hosts, the manifest also contains a
        - code [ref=e113]: host
        - text: field that specifies which host the plugin is for. This is used to identify the plugin in the manifest and in the plugin bundle.
