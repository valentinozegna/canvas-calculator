mean the ability to programmatically change the dimensions of the panel.\\u003c/p\\u003e\",\"post_number\":6,\"post_type\":1,\"posts_count\":19,\"updated_at\":\"2024-05-28T12:42:54.504Z\",\"reply_count\":1,\"reply_to_post_number\":5,\"quote_count\":0,\"incoming_link_count\":0,\"reads\":54,\"readers_count\":53,\"score\":15.8,\"yours\":false,\"topic_id\":5633,\"topic_slug\":\"is-there-a-way-to-resize-plugin-window-via-js\",\"display_username\":\"carlo diamanti\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":\"\",\"reply_to_user\":{\"id\":623,\"username\":\"Karmalakas\",\"name\":\"\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/karmalakas/{size}/1048_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":586,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/is-there-a-way-to-resize-plugin-window-via-js/5633/6\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":26187,\"name\":\"\",\"username\":\"Karmalakas\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/karmalakas/{size}/1048_2.png\",\"created_at\":\"2024-05-28T12:59:12.228Z\",\"cooked\":\"\\u003caside class=\\\"quote no-group\\\" data-username=\\\"svumme\\\" data-post=\\\"6\\\" data-topic=\\\"5633\\\"\\u003e\\n\\u003cdiv class=\\\"title\\\"\\u003e\\n\\u003cdiv class=\\\"quote-controls\\\"\\u003e\\u003c/div\\u003e\\n\\u003cimg loading=\\\"lazy\\\" alt=\\\"\\\" width=\\\"24\\\" height=\\\"24\\\" src=\\\"https://sea1.discourse-cdn.com/flex015/user_avatar/forums.creativeclouddeveloper.com/svumme/48/1289_2.png\\\" class=\\\"avatar\\\"\\u003e svumme:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eI mean the ability to programmatically change the dimensions of the panel\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eYes, I understand \\u003cimg src=\\\"https://emoji.discourse-cdn.com/apple/slight_smile.png?v=12\\\" title=\\\":slight_smile:\\\" class=\\\"emoji\\\" alt=\\\":slight_smile:\\\" loading=\\\"lazy\\\" width=\\\"20\\\" height=\\\"20\\\"\\u003e When I dock the panel, I usually adjust the size manually to place it where and how I wish, to make my workflow comfortable and consistent. If panel would get resized depending on some of my actions (or worse - depending on some actions, that developer decides), that would ruin the layout I’ve set up, thus ruining my usual workflow to reach the panels. In these cases I don’t mind having scrollbars, but the size should not change.\\u003c/p\\u003e\\n\\u003cp\\u003eIMO, if panel requires a size change, maybe the design (not necessary visual) is flawed. Maybe there should be some dialog or maybe even a completely separate panel with different interface \\u003cimg src=\\\"https://emoji.discourse-cdn.com/apple/thinking.png?v=12\\\" title=\\\":thinking:\\\" class=\\\"emoji\\\" alt=\\\":thinking:\\\" loading=\\\"lazy\\\" width=\\\"20\\\" height=\\\"20\\\"\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eI wonder what the use cases would be for actually justifiable panel size change without user actually changing the size manually\\u003c/p\\u003e\",\"post_number\":7,\"post_type\":1,\"posts_count\":19,\"updated_at\":\"2024-05-28T12:59:38.162Z\",\"reply_count\":1,\"reply_to_post_number\":6,\"quote_count\":1,\"incoming_link_count\":2,\"reads\":53,\"readers_count\":52,\"score\":25.6,\"yours\":false,\"topic_id\":5633,\"topic_slug\":\"is-there-a-way-to-resize-plugin-window-via-js\",\"display_username\":\"\",\"primary_group_name\":null,\"flair_name\":null,\"flai