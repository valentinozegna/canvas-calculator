ir_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"reply_to_user\":{\"id\":1469,\"username\":\"indranil\",\"name\":\"\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/indranil/{size}/2584_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":1381,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/is-there-a-way-to-resize-plugin-window-via-js/5633/12\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":26294,\"name\":\"carlo diamanti\",\"username\":\"svumme\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/svumme/{size}/1289_2.png\",\"created_at\":\"2024-06-03T21:46:36.762Z\",\"cooked\":\"\\u003cp\\u003eThank you for the response! Yes, but only if they are non-modal windows, in that case, they would be useful.\\u003c/p\\u003e\",\"post_number\":13,\"post_type\":1,\"posts_count\":19,\"updated_at\":\"2024-06-03T21:46:36.762Z\",\"reply_count\":1,\"reply_to_post_number\":11,\"quote_count\":0,\"incoming_link_count\":0,\"reads\":47,\"readers_count\":46,\"score\":14.4,\"yours\":false,\"topic_id\":5633,\"topic_slug\":\"is-there-a-way-to-resize-plugin-window-via-js\",\"display_username\":\"carlo diamanti\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":\"\",\"reply_to_user\":{\"id\":1469,\"username\":\"indranil\",\"name\":\"\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/indranil/{size}/2584_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":586,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/is-there-a-way-to-resize-plugin-window-via-js/5633/13\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":26372,\"name\":\"\",\"username\":\"indranil\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/indranil/{size}/2584_2.png\",\"created_at\":\"2024-06-07T17:00:58.461Z\",\"cooked\":\"\\u003cp\\u003eUnfortunately, the documentation of dialog options and overall dialogs is well…abysmal to be candid \\u003cimg src=\\\"https://emoji.discourse-cdn.com/apple/grimacing.png?v=12\\\" title=\\\":grimacing:\\\" class=\\\"emoji\\\" alt=\\\":grimacing:\\\" loading=\\\"lazy\\\" width=\\\"20\\\" height=\\\"20\\\"\\u003e. We are working on updating the dialog documentation, it shall take some time but it \\u003cem\\u003eshall be done\\u003c/em\\u003e. Here’s how you can try out a dialog that resizes upon clicking a button in it.\\u003c/p\\u003e\\n\\u003cpre\\u003e\\u003ccode class=\\\"lang-auto\\\"\\u003e\\u0026lt;!DOCTYPE HTML\\u0026gt;\\n\\u0026lt;html\\u0026gt;\\n\\u0026lt;head\\u0026gt;\\n \\u0026lt;script src=\\\"main.js\\\"\\u0026gt;\\u0026lt;/script\\u0026gt;\\n\\u0026lt;/head\\u0026gt;\\n\\u0026lt;body\\u0026gt;\\n \\u0026lt;button id=\\\"show-dialog\\\"\\u0026gt;Show dialog 3\\u0026lt;/button\\u0026gt;\\n\\u0026lt;/body\\u0026gt;\\n\\u0026lt;/body\\u0026gt;\\n\\u0026lt;/html\\u0026gt;\\n\\u003c/code\\u003e\\u003c/pre\\u003e\\n\\u003cp\\u003eand in \\u003ccode\\u003emain.js\\u003c/code\\u003e:\\u003c/p\\u003e\\n\\u003cpre\\u003e\\u003ccode class=\\\"lang-auto\\\"\\u003edocument.getElementById(\\\"show-dialog\\\").addEventListener(\\\"click\\\", (e) =\\u0026gt; {\\n const dialog = document.createElement(\\\"dialog\\\");\\n document.appendChild(dialog);\\n const resizeButton = document.createElement(\\\"button\\\");\\n resizeButton.innerText = \\\"Click to resize\\\";\\n resizeButton.addEventListener(\\\"click\\\", (e) =\\u0026gt; {\\n // random size on every click\\n dialog.resizeTo(\\n Math.floor(Math.random() * 50) + 500,\\n Math.floor(Math.random() * 50) + 500\\n );\\n });\\n dialog.appendChild(resizeButton);\\n dialog.show({\\n \\\"size\\\": {\\n \\\"width\\\": 300,\\n \\\"height\\\": 500\\n }\\n });\\n});\\n\\u003c/code\\u003e\\u003c/pre\\u003e\",\"post_number\":14,\"post_type\":1,\"posts_count\":19,\"updated_at\":\"2024-06-07T17:00:58.461Z\",\"reply_count\":1,\"reply_to_post_number\":12,\"quote_count\":0,\"incoming_link_count\":13,\"reads\":46,\"readers_count\":45,\"score\":184.2,\"yours\":false,\"topic_id\":5633,\"topic_slug\":\"is-there-a-way-to-resize-plugin-window-via-js\",\"display_username\":\"\",\"primary_group_name\":\"Adobe\",\"flair_name\":\"Adobe\",\"flair_url\":\"https://us1.discourse-cdn.com/flex015/uploads/xdplugins/original/1X/ce07c60b405789c1cb89b4d22e0fba1d356a6554.png\",\"flair_bg_color\":\"FFFFFF\",\"flair_color\":\"\",\"flair_group_id\":41,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":\"Adobe\",\"title_is_group\":true,\"reply_to_user\":{\"id\":1381,\"username\":\"PS-fxrios\",\"name\":\"PS-fxrios\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/ps-fxrios/{size}/2461_2.png\"},\"bookmarked\":false,\"actions_summary\":[{\"id\":2,\"count\":7}],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":1469,\"hidden\":false,\"trust_level\":4,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/is-there-a-way-to-resize-plugin-window-via-js/