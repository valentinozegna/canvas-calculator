      - heading "Manifest File Structure" [level=1] [ref=e147]
      - paragraph [ref=e148]: The plugin's manifest is where you include metadata about your plugin. Simply put, the manifest is a list of facts about your plugin in the form of a JSON object. No executable code goes into your manifest.
