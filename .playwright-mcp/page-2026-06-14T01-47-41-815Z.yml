- generic [ref=e2]: "{\"post_stream\":{\"posts\":[{\"id\":9953,\"name\":\"Andreas Resch\",\"username\":\"AndreasResch\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/andreasresch/{size}/1423_2.png\",\"created_at\":\"2021-06-07T08:07:15.005Z\",\"cooked\":\"\\u003cp\\u003eHello.\\u003c/p\\u003e\\n\\u003cp\\u003eI have no success to automatically adapt the height of the panel to its content. After loading, the panel is cut off when I set the values in the manifest.json to a low value. Everything is contained in a wrapper-div with these settings …\\u003c/p\\u003e\\n\\u003cp\\u003ediv#wrapper {\\u003cbr\\u003e\\nposition: absolute;\\u003cbr\\u003e\\ntop: 0; left: 0; right: 0; bottom: 0;\\u003cbr\\u003e\\npadding: 12px;\\u003cbr\\u003e\\noverflow: auto;\\u003cbr\\u003e\\n}\\u003c/p\\u003e\\n\\u003cp\\u003eAny ideas?\\u003c/p\\u003e\",\"post_number\":1,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-07T08:07:15.005Z\",\"reply_count\":0,\"reply_to_post_number\":null,\"quote_count\":0,\"incoming_link_count\":247,\"reads\":66,\"readers_count\":65,\"score\":1248.2,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Andreas Resch\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":822,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/1\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":9959,\"name\":\"Simon Henke\",\"username\":\"simonhenke\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/simonhenke/{size}/957_2.png\",\"created_at\":\"2021-06-07T10:33:53.788Z\",\"cooked\":\"\\u003cp\\u003eYou can’t dynamically adjust the panel size (via code). The size you specify in the manifest, is the one that it will have once it’s loaded. I usually build out my whole interface, and then set the size in the manifest to a value that shows the whole interface without scrolling. The user can then resize the panel to his liking (which might cause it to show scrollbars).\\u003c/p\\u003e\",\"post_number\":2,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-07T10:33:53.788Z\",\"reply_count\":1,\"reply_to_post_number\":null,\"quote_count\":0,\"incoming_link_count\":2,\"reads\":66,\"readers_count\":65,\"score\":43.2,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Simon Henke\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"bookmarked\":false,\"actions_summary\":[{\"id\":2,\"count\":1}],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":592,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/2\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":10015,\"name\":\"Andreas Resch\",\"username\":\"AndreasResch\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/andreasresch/{size}/1423_2.png\",\"created_at\":\"2021-06-08T08:42:36.312Z\",\"cooked\":\"\\u003cp\\u003eThat works fine when you have a static interface, but when you have collapsible panels, this is rather annoying to have to resize the panel manually all the time.\\u003c/p\\u003e\",\"post_number\":3,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-08T08:42:36.312Z\",\"reply_count\":1,\"reply_to_post_number\":2,\"quote_count\":0,\"incoming_link_count\":0,\"reads\":64,\"readers_count\":63,\"score\":17.8,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Andreas Resch\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"reply_to_user\":{\"id\":592,\"username\":\"simonhenke\",\"name\":\"Simon Henke\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/simonhenke/{size}/957_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":822,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/3\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":10018,\"name\":\"Simon Henke\",\"username\":\"simonhenke\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/simonhenke/{size}/957_2.png\",\"created_at\":\"2021-06-08T09:23:00.005Z\",\"cooked\":\"\\u003cp\\u003eFor me personally, a “jumping” panel would be way more annoying. Wouldn’t that be as if your browser window would adjust in size all the time just because a website expands content?\\u003c/p\\u003e\\n\\u003cp\\u003eAnd if you have scrollable content, I don’t see the need to “resize the panel manually all the time”. Just scroll instead \\u003cimg src=\\\"https://emoji.discourse-cdn.com/apple/sweat_smile.png?v=9\\\" title=\\\":sweat_smile:\\\" class=\\\"emoji\\\" alt=\\\":sweat_smile:\\\"\\u003e\\u003c/p\\u003e\",\"post_number\":4,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-08T09:23:00.005Z\",\"reply_count\":1,\"reply_to_post_number\":3,\"quote_count\":0,\"incoming_link_count\":2,\"reads\":64,\"readers_count\":63,\"score\":42.8,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Simon Henke\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"reply_to_user\":{\"id\":822,\"username\":\"AndreasResch\",\"name\":\"Andreas Resch\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/andreasresch/{size}/1423_2.png\"},\"bookmarked\":false,\"actions_summary\":[{\"id\":2,\"count\":1}],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":592,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/4\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":10019,\"name\":\"Andreas Resch\",\"username\":\"AndreasResch\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/andreasresch/{size}/1423_2.png\",\"created_at\":\"2021-06-08T09:26:14.664Z\",\"cooked\":\"\\u003cp\\u003eCollapsible panels are quite common and as long as you yourself can collapse/expand them, they aren’t annoying but functional. A lot of programs use them to simplify the UI.\\u003c/p\\u003e\",\"post_number\":5,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-08T09:26:14.664Z\",\"reply_count\":0,\"reply_to_post_number\":4,\"quote_count\":0,\"incoming_link_count\":0,\"reads\":62,\"readers_count\":61,\"score\":12.4,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Andreas Resch\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"reply_to_user\":{\"id\":592,\"username\":\"simonhenke\",\"name\":\"Simon Henke\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/simonhenke/{size}/957_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":822,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/5\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":10028,\"name\":\"Kerri Shotts\",\"username\":\"kerrishotts\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/kerrishotts/{size}/8_2.png\",\"created_at\":\"2021-06-08T16:00:31.459Z\",\"cooked\":\"\\u003cp\\u003ePhotoshop panels do not adjust their size based on the content. They are restricted to the sizes defined by the manifest. Plugins also cannot control the size of their panel programmatically.\\u003c/p\\u003e\\n\\u003cp\\u003eUsers \\u003cem\\u003ecan\\u003c/em\\u003e collapse the panel if they so choose (they can double-click on the tab to collapse it), but this is entirely at the user’s discretion.\\u003c/p\\u003e\\n\\u003cp\\u003eThe expectation is that plugin developers will design their UI in a responsive manner – allowing the user to configure the panel to their liking. Sometimes limits must be placed on this (min/max size), but generally, it should be left to the user to control their workspace, rather than the plugin doing it.\\u003c/p\\u003e\\n\\u003cp\\u003eIf your plugin consists of multiple accordions in the UI, you might want to consider shipping with multiple panels instead. Then the user can group all those panels together, resize them, collapse them, etc., as they choose. (Plus they can decide the ordering.) We are working on adding a feature to the manifest that will let you specify that a plugin’s panels should be automatically grouped together at first use.\\u003c/p\\u003e\",\"post_number\":6,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-08T16:00:31.459Z\",\"reply_count\":1,\"reply_to_post_number\":null,\"quote_count\":0,\"incoming_link_count\":10,\"reads\":62,\"readers_count\":61,\"score\":97.4,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Kerri Shotts\",\"primary_group_name\":\"Adobe\",\"flair_name\":\"Adobe\",\"flair_url\":\"https://us1.discourse-cdn.com/flex015/uploads/xdplugins/original/1X/ce07c60b405789c1cb89b4d22e0fba1d356a6554.png\",\"flair_bg_color\":\"FFFFFF\",\"flair_color\":\"\",\"flair_group_id\":41,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":\"Adobe\",\"title_is_group\":true,\"bookmarked\":false,\"actions_summary\":[{\"id\":2,\"count\":2}],\"moderator\":true,\"admin\":true,\"staff\":true,\"user_id\":2,\"hidden\":false,\"trust_level\":4,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/6\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null},{\"id\":10029,\"name\":\"Andreas Resch\",\"username\":\"AndreasResch\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/andreasresch/{size}/1423_2.png\",\"created_at\":\"2021-06-08T16:13:13.731Z\",\"cooked\":\"\\u003cp\\u003eThanks for the reply. It only concern one smaller accordion, so separating it makes no sense. I’ll have to think about some solution. Eventually I will stay away from the collapsing option.\\u003c/p\\u003e\",\"post_number\":7,\"post_type\":1,\"posts_count\":7,\"updated_at\":\"2021-06-08T16:13:13.731Z\",\"reply_count\":0,\"reply_to_post_number\":6,\"quote_count\":0,\"incoming_link_count\":6,\"reads\":62,\"readers_count\":61,\"score\":42.4,\"yours\":false,\"topic_id\":3046,\"topic_slug\":\"automatic-panel-height-suggestions\",\"display_username\":\"Andreas Resch\",\"primary_group_name\":null,\"flair_name\":null,\"flair_url\":null,\"flair_bg_color\":null,\"flair_color\":null,\"flair_group_id\":null,\"badges_granted\":[],\"version\":1,\"can_edit\":false,\"can_delete\":false,\"can_recover\":false,\"can_see_hidden_post\":false,\"can_wiki\":false,\"read\":true,\"user_title\":null,\"reply_to_user\":{\"id\":2,\"username\":\"kerrishotts\",\"name\":\"Kerri Shotts\",\"avatar_template\":\"/user_avatar/forums.creativeclouddeveloper.com/kerrishotts/{size}/8_2.png\"},\"bookmarked\":false,\"actions_summary\":[],\"moderator\":false,\"admin\":false,\"staff\":false,\"user_id\":822,\"hidden\":false,\"trust_level\":2,\"deleted_at\":null,\"user_deleted\":false,\"edit_reason\":null,\"can_view_edit_history\":true,\"wiki\":false,\"post_url\":\"/t/automatic-panel-height-suggestions/3046/7\",\"can_accept_answer\":false,\"can_unaccept_answer\":false,\"accepted_answer\":false,\"topic_accepted_answer\":null}],\"stream\":[9953,9959,10015,10018,10019,10028,10029]},\"timeline_lookup\":[[1,1833],[3,1832],[6,1831]],\"suggested_topics\":[],\"tags\":[],\"tags_descriptions\":{},\"fancy_title\":\"Automatic panel height suggestions\",\"id\":3046,\"